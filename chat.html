<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindBridge | Safe Chat</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dual-chat-shell {
      max-width: 1200px;
      margin-top: 2rem;
    }

    .dual-chat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
    }

    .chat-panel {
      background: #fff;
      border: 1px solid #dbe4f0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.1);
      display: flex;
      flex-direction: column;
      min-height: 520px;
    }

    .chat-topbar {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #dbe4f0;
      background: #f5f8ff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.6rem;
    }

    .chat-title {
      margin: 0;
      color: #1d4ed8;
      font-size: 1rem;
      font-weight: 700;
    }

    .chat-live {
      font-size: 0.78rem;
      font-weight: 600;
      color: #166534;
      background: #dcfce7;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
    }

    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      background: linear-gradient(180deg, #fbfdff 0%, #f4f8ff 100%);
    }

    .msg-row {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .msg-row.self {
      align-self: flex-end;
      text-align: right;
    }

    .msg-row.other {
      align-self: flex-start;
      text-align: left;
    }

    .msg-bubble {
      border-radius: 12px;
      padding: 0.56rem 0.72rem;
      border: 1px solid #dbe4f0;
      background: #ffffff;
      word-break: break-word;
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.05);
    }

    .msg-row.self .msg-bubble {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
    }

    .msg-meta {
      font-size: 0.73rem;
      color: #6b7280;
      margin-top: 0.12rem;
    }

    .chat-controls {
      border-top: 1px solid #dbe4f0;
      padding: 0.8rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: #fff;
    }

    .chat-input {
      flex: 1;
      border: 1px solid #dbe4f0;
      border-radius: 10px;
      padding: 0.65rem 0.7rem;
      font-size: 0.95rem;
    }

    .chat-quick-actions {
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      margin: 0.8rem 0;
      flex-wrap: wrap;
    }

    @media (max-width: 760px) {
      .msg-row { max-width: 100%; }
      .chat-controls { flex-direction: column; }
      .chat-input { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="container content-section dual-chat-shell">
    <h1>Safe Chat Space</h1>
    <p class="muted">WhatsApp-style two-way support chat. Left is Student view, right is Counselor view.</p>

    <div class="chat-quick-actions">
      <button id="refreshAllBtn" class="btn btn-secondary">Refresh Both Chats</button>
      <button id="clearChatBtn" class="btn btn-secondary">Clear Chat</button>
    </div>

    <div class="dual-chat-grid">
      <section class="chat-panel" aria-label="Student Chat Panel">
        <div class="chat-topbar">
          <h2 class="chat-title">Student Chat</h2>
          <span class="chat-live">Online</span>
        </div>
        <div id="studentThread" class="chat-thread" aria-live="polite"></div>
        <div class="chat-controls">
          <input id="studentInput" class="chat-input" type="text" maxlength="500" placeholder="Student: Type your message...">
          <button id="studentSendBtn" class="btn btn-primary">Send</button>
        </div>
      </section>

      <section class="chat-panel" aria-label="Counselor Chat Panel">
        <div class="chat-topbar">
          <h2 class="chat-title">Counselor Chat</h2>
          <span class="chat-live">Online</span>
        </div>
        <div id="counselorThread" class="chat-thread" aria-live="polite"></div>
        <div class="chat-controls">
          <input id="counselorInput" class="chat-input" type="text" maxlength="500" placeholder="Counselor: Type your message...">
          <button id="counselorSendBtn" class="btn btn-primary">Send</button>
        </div>
      </section>
    </div>

    <p id="chatStatus" class="status" aria-live="polite"></p>
    <a class="btn btn-secondary" href="index.html">Back Home</a>
  </main>

  <footer class="site-footer">
    <p><a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Use</a></p>
  </footer>

  <script src="app-config.js"></script>
  <script>
    const API_BASE = window.MB_API_BASE || "http://localhost:3000";

    function setStatus(message, isError = false) {
      const status = document.getElementById("chatStatus");
      status.textContent = message;
      status.style.color = isError ? "#b91c1c" : "#0f766e";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderThread(threadElementId, viewer) {
      return (items) => {
        const box = document.getElementById(threadElementId);
        const rows = (items || []).filter((item) => item && item.message);

        if (!rows.length) {
          box.innerHTML = "<p class='muted'>No messages yet. Start the conversation.</p>";
          return;
        }

        box.innerHTML = rows.map((item) => {
          const user = item.user || "User";
          const role = user.toLowerCase() === viewer.toLowerCase() ? "self" : "other";
          const time = new Date(item.time).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

          return `<div class="msg-row ${role}">
            <div class="msg-bubble">${escapeHtml(item.message)}</div>
            <div class="msg-meta">${escapeHtml(user)} &bull; ${time}</div>
          </div>`;
        }).join("");

        box.scrollTop = box.scrollHeight;
      };
    }

    const renderStudentView = renderThread("studentThread", "Student");
    const renderCounselorView = renderThread("counselorThread", "Counselor");

    async function loadHistory() {
      try {
        const res = await fetch(`${API_BASE}/chat/history`);
        const data = await res.json();
        const history = data.history || [];
        renderStudentView(history);
        renderCounselorView(history);
      } catch {
        setStatus("Failed to load chat history.", true);
      }
    }

    async function sendMessage(user, inputId) {
      const input = document.getElementById(inputId);
      const message = input.value.trim();
      if (!message) return;

      setStatus(`${user} sending message...`);

      try {
        const res = await fetch(`${API_BASE}/chat/send`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user, message })
        });

        if (!res.ok) throw new Error("request failed");

        input.value = "";
        setStatus(`${user} message sent.`);
        await loadHistory();
      } catch {
        setStatus(`Could not send message for ${user}.`, true);
      }
    }

    async function clearChat() {
      setStatus("Clearing chat...");
      try {
        const res = await fetch(`${API_BASE}/chat/clear`, {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error("clear failed");
        await loadHistory();
        setStatus(data.message || "Chat cleared.");
      } catch {
        setStatus("Could not clear chat.", true);
      }
    }

    document.getElementById("studentSendBtn").addEventListener("click", () => sendMessage("Student", "studentInput"));
    document.getElementById("counselorSendBtn").addEventListener("click", () => sendMessage("Counselor", "counselorInput"));
    document.getElementById("refreshAllBtn").addEventListener("click", loadHistory);
    document.getElementById("clearChatBtn").addEventListener("click", clearChat);

    document.getElementById("studentInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage("Student", "studentInput");
    });

    document.getElementById("counselorInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage("Counselor", "counselorInput");
    });

    loadHistory();
    setInterval(loadHistory, 8000);
  </script>
</body>
</html>
